name: Deploy viewer

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate taxonomy and viewer
        run: |
          npm run validate
          node --check viewer/app.js

      - name: Prepare static site
        shell: bash
        run: |
          site="${RUNNER_TEMP}/site"
          mkdir -p "$site"
          cp viewer/index.html viewer/app.js viewer/styles.css "$site/"
          cp -R data "$site/data"
          touch "$site/.nojekyll"
          test -f "$site/index.html"
          test -f "$site/data/manifest.json"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
