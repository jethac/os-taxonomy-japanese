name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  taxonomy-and-viewer:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate taxonomy data
        run: npm run validate

      - name: Check viewer JavaScript
        run: node --check viewer/app.js
